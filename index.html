<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gasolineras Asturias - Precios al día</title>
    <!-- Dependencias de React y Estilos -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURACIÓN ---
        // DEBES PONER TUS CREDENCIALES AQUÍ:
        const SUPABASE_URL = 'TU_URL_DE_SUPABASE'; 
        const SUPABASE_KEY = 'TU_KEY_ANON_DE_SUPABASE';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ZONES = ['OVIEDO', 'GIJON', 'AVILES', 'CUENCAS', 'ORIENTAL', 'OCCIDENTAL'];

        function App() {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [fuelType, setFuelType] = useState('price_95');
            const [error, setError] = useState(null);

            useEffect(() => {
                const today = new Date().toLocaleDateString('es-ES');
                document.title = `Gasolineras más baratas en Asturias hoy ${today}`;
                fetchData();
            }, []);

            async function fetchData() {
                if (SUPABASE_URL === 'TU_URL_DE_SUPABASE') {
                    setLoading(false);
                    setError('Introduce tus credenciales de Supabase en el código (líneas 24 y 25).');
                    return;
                }
                try {
                    const { data: records, error } = await supabase
                        .from('prices')
                        .select('*')
                        .order('created_at', { ascending: false })
                        .limit(200);
                    if (error) throw error;
                    if (records && records.length > 0) {
                        const lastDate = records[0].created_at;
                        setData(records.filter(r => r.created_at === lastDate));
                    }
                } catch (err) {
                    setError('Error de conexión con la base de datos de Supabase.');
                } finally {
                    setLoading(false);
                }
            }

            const getBest = (type) => [...data].filter(s => s[type]).sort((a,b) => a[type] - b[type])[0];
            const getZoneBest = (zone, type) => data.filter(s => s.zone === zone && s[type]).sort((a,b) => a[type] - b[type])[0];
            const chollo = getBest(fuelType);

            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-emerald-600">Cargando ahorros...</div>;

            return (
                <div className="pb-20">
                    <header className="bg-white border-b sticky top-0 z-50 p-4 flex justify-between items-center shadow-sm">
                        <h1 className="text-xl font-black text-emerald-800">AsturGasol</h1>
                        <div className="bg-emerald-100 p-1 rounded-full flex text-xs font-bold">
                            <button onClick={() => setFuelType('price_95')} className={`px-4 py-1 rounded-full ${fuelType === 'price_95' ? 'bg-emerald-600 text-white shadow-md' : 'text-emerald-800'}`}>95</button>
                            <button onClick={() => setFuelType('price_diesel')} className={`px-4 py-1 rounded-full ${fuelType === 'price_diesel' ? 'bg-emerald-600 text-white shadow-md' : 'text-emerald-800'}`}>Diesel</button>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto px-4 pt-6 space-y-6">
                        {/* Espacio Publicitario 1 */}
                        <div className="bg-emerald-50 border-2 border-dashed rounded-xl h-20 flex items-center justify-center text-emerald-300 font-bold text-xs uppercase tracking-widest italic">Espacio Publicitario</div>

                        {/* El Chollo Hero */}
                        <section className="bg-gradient-to-br from-emerald-600 to-emerald-900 rounded-[2rem] p-8 text-white shadow-xl relative overflow-hidden">
                            <h2 className="text-xs font-bold uppercase tracking-widest opacity-80 mb-2">El Chollo de Hoy en Asturias</h2>
                            {chollo ? (
                                <>
                                    <div className="flex items-baseline gap-1 mb-4">
                                        <span className="text-6xl font-black">{chollo[fuelType].toFixed(3)}</span>
                                        <span className="text-xl opacity-60 font-medium italic">€/L</span>
                                    </div>
                                    <div className="mb-6 italic opacity-90 leading-tight">
                                        <p className="font-black text-lg">{chollo.station_name}</p>
                                        <p className="text-sm">{chollo.address}, {chollo.municipality}</p>
                                    </div>
                                    <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(chollo.address + ' ' + chollo.municipality)}`} 
                                       target="_blank" className="w-full bg-white text-emerald-900 py-4 rounded-2xl font-black text-center block shadow-lg active:scale-95 transition-transform">🚀 Ir ahora</a>
                                </>
                            ) : <p>Sin datos todavía</p>}
                        </section>

                        <div className="space-y-4">
                            <h3 className="text-lg font-black text-emerald-950 px-2 italic">Mejores precios por Zona</h3>
                            {ZONES.map((zone, idx) => {
                                const best = getZoneBest(zone, fuelType);
                                return (
                                    <div key={zone}>
                                        <div className="bg-white border border-emerald-50 rounded-3xl p-6 shadow-sm">
                                            <div className="flex justify-between items-center mb-4 border-b border-gray-50 pb-3">
                                                <h4 className="font-black text-emerald-800 uppercase text-sm tracking-tighter">{zone}</h4>
                                                <span className="text-xl font-black text-emerald-600 italic">
                                                    {best ? best[fuelType].toFixed(3) : '---'} <small className="text-[10px] text-gray-400">€/L</small>
                                                </span>
                                            </div>
                                            {best && (
                                                <div className="space-y-4">
                                                    <p className="text-[10px] text-gray-500 truncate">{best.station_name} • {best.address}</p>
                                                    <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(best.address + ' ' + best.municipality)}`} 
                                                       target="_blank" className="bg-emerald-50 text-emerald-700 py-3 rounded-xl block text-center font-black text-xs uppercase italic">📍 Ubicación</a>
                                                </div>
                                            )}
                                        </div>
                                        {/* Publicidad intermedia */}
                                        {idx === 2 && <div className="mt-4 bg-emerald-50 border-2 border-dashed rounded-xl h-20 flex items-center justify-center text-emerald-300 font-bold text-xs uppercase tracking-widest italic">Espacio Publicitario</div>}
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    <footer className="bg-emerald-950 text-emerald-400 py-12 text-center text-xs space-y-4 mt-10 p-6 font-medium">
                        <p className="text-white font-bold text-sm">Precios actualizados el {new Date().toLocaleDateString('es-ES')} a las 08:10</p>
                        <p className="opacity-40 uppercase tracking-tighter">© 2026 AsturGasol • Los precios pueden variar • Datos MITECO</p>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
