<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsturGasoil - Precios al día</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Outfit', sans-serif; } </style>
</head>
<body class="bg-gray-50 uppercase">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- TUS CLAVES INTEGRADAS ---
        const SUPABASE_URL = 'https://qbuvcyggfmbkdifkamyq.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_6VntxupDrFBc-PIXtMQoMw_pJ0uzxzd';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ZONES = ['OVIEDO', 'GIJON', 'AVILES', 'CUENCAS', 'ORIENTAL', 'OCCIDENTAL'];

        function App() {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [fuelType, setFuelType] = useState('price_95');

            useEffect(() => { fetchData(); }, []);

            async function fetchData() {
                try {
                    const { data: records, error } = await supabase
                        .from('prices')
                        .select('*')
                        .order('created_at', { ascending: false })
                        .limit(600); 
                    if (error) throw error;
                    if (records && records.length > 0) {
                        const lastTime = new Date(records[0].created_at).getTime();
                        const batchData = records.filter(r => (lastTime - new Date(r.created_at).getTime()) < 60000);
                        setData(batchData);
                    }
                } catch (err) { console.error(err); } finally { setLoading(false); }
            }

            const getBest = (type) => [...data].filter(s => s[type]).sort((a,b) => a[type] - b[type])[0];
            const getZoneBest = (zone, type) => data.filter(s => s.zone === zone && s[type]).sort((a,b) => a[type] - b[type])[0];
            const chollo = getBest(fuelType);

            if (loading) return <div className="h-screen flex items-center justify-center font-black text-blue-600 animate-pulse">CARGANDO PRECIOS...</div>;

            return (
                <div className="pb-20 bg-blue-50/20 px-4">
                    <header className="max-w-md mx-auto bg-white/90 backdrop-blur shadow-xl rounded-3xl mt-4 p-4 flex justify-between items-center sticky top-4 z-50 border border-blue-50">
                        <h1 className="text-xl font-black text-blue-900 italic tracking-tighter">AsturGasoil</h1>
                        <div className="bg-blue-100 p-1 rounded-2xl flex text-[10px] font-black">
                            <button onClick={() => setFuelType('price_95')} className={`px-5 py-2 rounded-xl transition-all ${fuelType === 'price_95' ? 'bg-blue-600 text-white shadow-lg' : 'text-blue-600'}`}>95</button>
                            <button onClick={() => setFuelType('price_diesel')} className={`px-5 py-2 rounded-xl transition-all ${fuelType === 'price_diesel' ? 'bg-blue-600 text-white shadow-lg' : 'text-blue-600'}`}>DIESEL</button>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto pt-8 space-y-8">
                        <section className="bg-gradient-to-br from-blue-700 to-blue-900 rounded-[3rem] p-8 pt-12 text-white shadow-2xl relative overflow-hidden ring-4 ring-white">
                            <div className="absolute top-6 right-6 z-10 bg-yellow-400 text-blue-900 px-4 py-1.5 rounded-full text-[10px] font-black shadow-xl">EL MÁS BARATO HOY 🔥</div>
                            <h2 className="text-blue-200 font-bold text-[10px] tracking-[0.3em] mb-4 opacity-70 italic font-black text-left">GASOLINERA RECOMENDADA</h2>
                            {chollo ? (
                                <>
                                    <div className="flex items-baseline gap-1 mb-8">
                                        <span className="text-8xl font-black tracking-tighter text-yellow-400">{chollo[fuelType].toFixed(3)}</span>
                                        <span className="text-2xl font-bold italic opacity-60">€/L</span>
                                    </div>
                                    <div className="mb-8 bg-blue-800/40 p-5 rounded-3xl border border-white/10">
                                        <p className="font-black text-xl leading-tight mb-2 uppercase">{chollo.station_name}</p>
                                        <p className="text-[10px] text-blue-200 font-bold tracking-widest uppercase">{chollo.municipality}</p>
                                    </div>
                                    <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(chollo.station_name + ' ' + chollo.municipality)}`} 
                                       target="_blank" className="w-full bg-yellow-400 text-blue-900 py-5 rounded-[1.5rem] font-black text-center block shadow-2xl text-sm italic active:scale-95 transition-all">📍 IR AHORA</a>
                                </>
                            ) : <p className="italic opacity-50">SIN DATOS DE ESTE CARBURANTE...</p>}
                        </section>

                        <div className="space-y-4">
                            <h3 className="text-xl font-black text-blue-950 px-2 italic flex items-center gap-3">
                                <span className="w-1.5 h-6 bg-blue-600 rounded-full"></span>
                                COMPARATIVA ZONAS
                            </h3>
                            {ZONES.map((zone) => {
                                const best = getZoneBest(zone, fuelType);
                                return (
                                    <div key={zone} className="bg-white border border-blue-50 rounded-[2.5rem] p-7 shadow-sm">
                                        <div className="flex justify-between items-center">
                                            <h4 className="font-black text-blue-900 uppercase text-[11px] tracking-widest opacity-40">{zone}</h4>
                                            <div className="text-right bg-blue-50 px-4 py-2 rounded-2xl">
                                                <span className="text-2xl font-black text-blue-600 italic">{best ? best[fuelType].toFixed(3) : '---'}</span>
                                                <span className="text-[10px] font-bold text-blue-300 ml-1 italic">€/L</span>
                                            </div>
                                        </div>
                                        {best && (
                                            <div className="mt-5 pt-5 border-t border-gray-100 flex justify-between items-center">
                                                <div className="max-w-[150px]">
                                                    <p className="text-[10px] font-black text-slate-800 truncate uppercase">{best.station_name}</p>
                                                    <p className="text-[9px] text-slate-400 italic">{best.municipality}</p>
                                                </div>
                                                <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(best.station_name + ' ' + best.municipality)}`} target="_blank" className="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg transform hover:scale-110 transition-all font-bold">📍</a>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </main>
                    <footer className="py-20 text-center text-[10px] font-black text-blue-900/20 italic tracking-widest">ASTURGASOIL • EL PARAÍSO DEL AHORRO</footer>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
