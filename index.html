<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsturGasoil - Ahorra en Asturias</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-blue-50/30">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURACIÓN ---
        const SUPABASE_URL = 'https://qbuvcyggfmbkdifkamyq.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_6VntxupDrFBc-PIXtMQoMw_pJ0uzxzd';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ZONES = ['OVIEDO', 'GIJON', 'AVILES', 'CUENCAS', 'ORIENTAL', 'OCCIDENTAL'];

        function App() {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [fuelType, setFuelType] = useState('price_95');
            const [error, setError] = useState(null);

            useEffect(() => {
                const today = new Date().toLocaleDateString('es-ES');
                document.title = `AsturGasoil 💙💛 Precios Asturias hoy ${today}`;
                fetchData();
            }, []);

            async function fetchData() {
                if (SUPABASE_URL === 'TU_URL_DE_SUPABASE') {
                    setLoading(false);
                    setError('Faltan credenciales.');
                    return;
                }
                try {
                    const { data: records, error } = await supabase
                        .from('prices')
                        .select('*')
                        .order('created_at', { ascending: false })
                        .limit(300);
                    if (error) throw error;
                    if (records && records.length > 0) {
                        const lastDate = records[0].created_at;
                        setData(records.filter(r => r.created_at === lastDate));
                    }
                } catch (err) {
                    setError('Error de conexión.');
                } finally {
                    setLoading(false);
                }
            }

            const getBest = (type) => [...data].filter(s => s[type]).sort((a,b) => a[type] - b[type])[0];
            const getZoneBest = (zone, type) => data.filter(s => s.zone === zone && s[type]).sort((a,b) => a[type] - b[type])[0];
            const chollo = getBest(fuelType);

            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-blue-600 italic animate-pulse">💙💛 Preparando AsturGasoil...</div>;

            return (
                <div className="pb-20">
                    <header className="bg-white border-b border-blue-50 sticky top-0 z-50 p-4 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-3">
                             {/* EL LOGO SE CARGA AQUÍ */}
                             <img 
                                src="logo.png" 
                                alt="AsturGasoil" 
                                className="h-10 w-auto object-contain" 
                                onError={(e) => { e.target.style.display='none'; document.getElementById('logo-placeholder').style.display='flex'; }}
                             />
                             <div id="logo-placeholder" style={{display:'none'}} className="w-10 h-10 bg-blue-600 rounded-xl items-center justify-center shadow-lg">
                                <span className="text-white font-black text-xl italic hover:rotate-12 transition-transform">A</span>
                            </div>
                            <h1 className="text-xl font-black text-blue-900 tracking-tighter">AsturGasoil</h1>
                        </div>
                        <div className="bg-blue-100 p-1 rounded-full flex text-[11px] font-black">
                            <button onClick={() => setFuelType('price_95')} className={`px-5 py-2 rounded-full transition-all ${fuelType === 'price_95' ? 'bg-blue-600 text-white shadow-md' : 'text-blue-800 opacity-60'}`}>95</button>
                            <button onClick={() => setFuelType('price_diesel')} className={`px-5 py-2 rounded-full transition-all ${fuelType === 'price_diesel' ? 'bg-blue-600 text-white shadow-md' : 'text-blue-800 opacity-60'}`}>Diesel</button>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto px-4 pt-6 space-y-7">
                        {/* Mensaje SEO Asturias */}
                        <div className="bg-white border border-blue-100 rounded-2xl p-4 text-center shadow-sm relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-2 h-full bg-blue-500"></div>
                            <div className="absolute top-0 right-0 w-2 h-full bg-yellow-400"></div>
                            <p className="text-blue-900 font-bold text-sm leading-tight italic">
                                ¡El Paraíso del Ahorro! 💙💛 <br/>
                                <span className="text-[10px] font-medium opacity-60 uppercase tracking-widest text-blue-600">Compara los mejores precios hoy</span>
                            </p>
                        </div>

                        {/* El Chollo Hero */}
                        <section className="bg-gradient-to-br from-blue-600 to-blue-900 rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-4 z-10">
                                <div className="bg-yellow-400 text-blue-900 px-3 py-1 rounded-full text-[10px] font-black shadow-lg animate-bounce">
                                    ¡EL CHOLLO! 🔥
                                </div>
                            </div>
                            
                            <h2 className="text-blue-100 font-bold text-xs uppercase tracking-[0.2em] mb-3 opacity-80 font-mono">Más barato en Asturias hoy</h2>
                            {chollo ? (
                                <>
                                    <div className="flex items-baseline gap-1 mb-6">
                                        <span className="text-7xl font-black tracking-tighter text-yellow-400 drop-shadow-sm">{chollo[fuelType].toFixed(3)}</span>
                                        <span className="text-2xl opacity-70 font-medium italic uppercase tracking-tighter">€/L</span>
                                    </div>
                                    <div className="mb-8 border-l-4 border-yellow-400 pl-4 bg-white/5 p-4 rounded-r-xl">
                                        <p className="font-black text-xl leading-tight text-white truncate">{chollo.station_name}</p>
                                        <p className="text-xs text-blue-100 opacity-80 mt-1 truncate">{chollo.address}, {chollo.municipality}</p>
                                    </div>
                                    <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(chollo.address + ' ' + chollo.municipality)}`} 
                                       target="_blank" className="w-full bg-yellow-400 text-blue-900 py-5 rounded-2xl font-black text-center block shadow-2xl active:scale-95 transition-transform hover:bg-yellow-300">📍 Ir ahora</a>
                                </>
                            ) : <p>Cargando datos...</p>}
                        </section>

                        <div className="space-y-4">
                            <h3 className="text-lg font-black text-blue-950 px-2 italic flex items-center gap-2">
                                <span className="w-2 h-5 bg-blue-600 rounded-full"></span>
                                Clasificación por Zonas
                            </h3>
                            {ZONES.map((zone, idx) => {
                                const best = getZoneBest(zone, fuelType);
                                return (
                                    <div key={zone}>
                                        <div className="bg-white border border-blue-50 rounded-[2rem] p-6 shadow-sm hover:shadow-md transition-shadow">
                                            <div className="flex justify-between items-center mb-4 border-b border-gray-50 pb-4">
                                                <h4 className="font-black text-blue-800 uppercase text-xs tracking-wider">{zone}</h4>
                                                <div className="text-right">
                                                    <span className="text-2xl font-black text-blue-600 italic">
                                                        {best ? best[fuelType].toFixed(3) : '---'}
                                                    </span>
                                                    <span className="text-[10px] font-bold text-gray-400 ml-1 italic">€/L</span>
                                                </div>
                                            </div>
                                            {best && (
                                                <div className="space-y-4">
                                                    <div>
                                                        <p className="text-[11px] font-bold text-slate-800 truncate leading-tight uppercase">{best.station_name}</p>
                                                        <p className="text-[10px] text-slate-400 truncate mt-1 italic">{best.address}</p>
                                                    </div>
                                                    <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(best.address + ' ' + best.municipality)}`} 
                                                       target="_blank" className="bg-blue-50 text-blue-700 py-3 rounded-xl block text-center font-black text-[10px] uppercase italic hover:bg-blue-100 transition-colors">📍 Ubicación</a>
                                                </div>
                                            )}
                                        </div>
                                        {/* Banner Asturias Intermedio */}
                                        {idx === 2 && (
                                            <div className="mt-8 bg-blue-950 rounded-3xl p-7 text-center shadow-2xl relative overflow-hidden text-white border-b-4 border-yellow-400">
                                                <div className="absolute top-0 left-0 w-full h-full opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-yellow-400 via-transparent to-transparent"></div>
                                                <p className="text-sm font-black italic relative z-10 text-emerald-50">
                                                    💙💛 Asturias - Paraíso Natural y Ahorro <br/>
                                                    <span className="text-[10px] opacity-60 font-medium tracking-widest uppercase italic">Actualización automática todos los días</span>
                                                </p>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    <footer className="bg-blue-950 text-blue-400 py-24 px-8 text-center text-[10px] space-y-6 mt-16 p-6 font-medium relative">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 flex gap-2">
                             <div className="w-8 h-2 bg-blue-600 rounded-full"></div>
                             <div className="w-8 h-2 bg-yellow-400 rounded-full"></div>
                             <div className="w-8 h-2 bg-blue-600 rounded-full"></div>
                        </div>
                        <p className="text-white font-black text-lg tracking-tighter uppercase italic">AsturGasoil • Asturias</p>
                        <p className="font-bold opacity-70 border border-blue-400/20 inline-block px-5 py-2 rounded-full italic">Actualizado cada mañana a las 08:10</p>
                        <p className="opacity-40 uppercase tracking-tighter leading-relaxed">
                            © 2026 AsturGasoil • Los precios pueden variar • Datos públicos MITECO
                        </p>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
