<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GasAsturias - Precios en Tiempo Real</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0066cc;
            --primary-light: #4da3ff;
            --accent: #ffcc00;
            --bg: #0a0f18;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --text-dim: #a0aec0;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(0, 102, 204, 0.15) 0%, transparent 25%),
                radial-gradient(circle at 80% 80%, rgba(255, 204, 0, 0.05) 0%, transparent 25%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--primary-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        /* Hero Section */
        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .cheapest-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .cheapest-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-light);
        }

        .cheapest-card::after {
            content: 'TOP PRICE';
            position: absolute;
            top: 20px;
            right: -30px;
            background: var(--accent);
            color: #000;
            padding: 5px 40px;
            transform: rotate(45deg);
            font-weight: 700;
            font-size: 0.7rem;
        }

        .card-label {
            color: var(--primary-light);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            display: block;
        }

        .price-value {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .price-unit {
            font-size: 1.5rem;
            font-weight: 400;
            vertical-align: middle;
            margin-left: 0.5rem;
        }

        .station-info {
            font-size: 1.1rem;
        }

        .station-name {
            font-weight: 600;
            display: block;
            margin-bottom: 0.2rem;
        }

        .station-address {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        /* Zones Grid */
        .zones-title {
            font-size: 2rem;
            margin-bottom: 2rem;
            border-left: 4px solid var(--primary);
            padding-left: 1rem;
        }

        .zones-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .zone-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .zone-card:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .zone-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .zone-name {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary-light);
        }

        .fuel-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .fuel-type {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .fuel-price {
            font-weight: 700;
            color: var(--accent);
            font-size: 1.2rem;
        }

        .fuel-details {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: -0.5rem;
            margin-bottom: 1rem;
            display: block;
        }

        footer {
            margin-top: 6rem;
            text-align: center;
            padding: 2rem;
            color: var(--text-dim);
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loading state */
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
        }

        .pulse {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }

        @media (max-width: 768px) {
            .hero { grid-template-columns: 1fr; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>GasAsturias</h1>
            <p class="subtitle">PRECIOS ACTUALIZADOS • CADA DÍA A LAS 07:00 AM</p>
        </header>

        <div id="content">
            <div class="loader"><div class="pulse"></div></div>
        </div>

        <footer>
            <p>&copy; 2026 Datos extraídos del Ministerio de Industria, Comercio y Turismo.</p>
            <p>Asturias, Paraíso Natural y Precios Justos.</p>
        </footer>
    </div>

    <script>
        // Use environment variables or hardcoded values for the public client
        // For security, RLS (Row Level Security) should be enabled in Supabase
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

        async function init() {
            if (SUPABASE_URL === 'YOUR_SUPABASE_URL') {
                document.getElementById('content').innerHTML = `
                    <div style="text-align: center; border: 2px dashed var(--accent); padding: 3rem; border-radius: 20px;">
                        <h2 style="color: var(--accent); margin-bottom: 1rem;">Configuración Requerida</h2>
                        <p>Edita el archivo <code>index.html</code> y añade tus credenciales de Supabase en el script inferior para ver los datos.</p>
                    </div>
                `;
                return;
            }

            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            try {
                // Fetch latest prices (grouped by zone internally, but we fetch all latest)
                // We'll fetch the most recent records based on created_at
                const { data, error } = await supabaseClient
                    .from('prices')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(200);

                if (error) throw error;
                if (!data || data.length === 0) {
                    document.getElementById('content').innerHTML = '<p style="text-align:center">No hay datos disponibles todavía. Espera a la próxima actualización de las 06:45 AM.</p>';
                    return;
                }

                // Filter data to only include the last update batch
                const lastDate = data[0].created_at;
                const latestBatch = data.filter(d => d.created_at === lastDate);

                renderDashboard(latestBatch);

            } catch (err) {
                console.error(err);
                document.getElementById('content').innerHTML = '<p style="color:red; text-align:center">Error al conectar con Supabase. Revisa las credenciales.</p>';
            }
        }

        function renderDashboard(data) {
            const cheapest95 = data.find(d => d.is_cheapest_asturias_95) || data.sort((a,b) => a.price_95 - b.price_95)[0];
            const cheapestDiesel = data.find(d => d.is_cheapest_asturias_diesel) || data.sort((a,b) => a.price_diesel - b.price_diesel)[0];

            let zonesHtml = '';
            const zones = [...new Set(data.map(d => d.zone))];
            
            zones.forEach(zone => {
                const zoneData = data.filter(d => d.zone === zone);
                const best95 = zoneData.filter(d => d.price_95).sort((a,b) => a.price_95 - b.price_95)[0];
                const bestDiesel = zoneData.filter(d => d.price_diesel).sort((a,b) => a.price_diesel - b.price_diesel)[0];

                zonesHtml += `
                    <div class="zone-card">
                        <div class="zone-header">
                            <span class="zone-name">${zone}</span>
                        </div>
                        <div class="fuel-row">
                            <span class="fuel-type">Gasolina 95</span>
                            <span class="fuel-price">${best95 ? best95.price_95 : 'N/A'} <small>€</small></span>
                        </div>
                        <span class="fuel-details">${best95 ? best95.station_name + ' (' + best95.municipality + ')' : ''}</span>
                        
                        <div class="fuel-row">
                            <span class="fuel-type">Gasóleo A</span>
                            <span class="fuel-price">${bestDiesel ? bestDiesel.price_diesel : 'N/A'} <small>€</small></span>
                        </div>
                        <span class="fuel-details">${bestDiesel ? bestDiesel.station_name + ' (' + bestDiesel.municipality + ')' : ''}</span>
                    </div>
                `;
            });

            document.getElementById('content').innerHTML = `
                <div class="hero">
                    <div class="cheapest-card">
                        <span class="card-label">Mejor Precio Gasolina 95</span>
                        <div class="price-value">${cheapest95.price_95}<span class="price-unit">€/L</span></div>
                        <div class="station-info">
                            <span class="station-name">${cheapest95.station_name}</span>
                            <span class="station-address">${cheapest95.address}, ${cheapest95.municipality}</span>
                        </div>
                    </div>
                    <div class="cheapest-card">
                        <span class="card-label">Mejor Precio Diesel A</span>
                        <div class="price-value">${cheapestDiesel.price_diesel}<span class="price-unit">€/L</span></div>
                        <div class="station-info">
                            <span class="station-name">${cheapestDiesel.station_name}</span>
                            <span class="station-address">${cheapestDiesel.address}, ${cheapestDiesel.municipality}</span>
                        </div>
                    </div>
                </div>

                <h2 class="zones-title">Precios por Zona</h2>
                <div class="zones-grid">
                    ${zonesHtml}
                </div>
            `;
        }

        init();
    </script>
</body>
</html>
